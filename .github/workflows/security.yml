name: security

on:
  push:
  pull_request:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # gitleaks-action auto-detects .gitleaks.toml at the repo root (same
      # precedence as the gitleaks CLI), so GITLEAKS_CONFIG is not required
      # here. It is a personal-account repo, so no GITLEAKS_LICENSE either.
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
