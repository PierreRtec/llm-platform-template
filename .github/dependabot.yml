version: 2

updates:
  # Python dependencies, resolved from pyproject.toml / uv.lock.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  # Actions used by the workflows in this directory (ci.yml, security.yml,
  # and later eval.yml / terraform.yml).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
