name: llm-platform

include:
  - docker-compose.langfuse.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      # The official postgres image does not support POSTGRES_MULTIPLE_DATABASES
      # natively; scripts/init-db.sh (mounted below) reads this variable itself
      # and creates one database per comma-separated name (see script for details).
      POSTGRES_MULTIPLE_DATABASES: app,litellm,langfuse
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Shared instance: LiteLLM's own cache/router use DB 1 (see gateway/litellm.config.yaml
    # cache_params.db / router_settings.redis_db) so it never collides with Langfuse's
    # queues, which always run on DB 0 (Langfuse has no DB-index override).
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    volumes:
      - ./gateway/litellm.config.yaml:/etc/litellm/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/litellm
      REDIS_HOST: redis
      SCALEWAY_API_KEY: ${SCALEWAY_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # The litellm image (Wolfi-based) ships neither wget nor curl, but it does
      # ship the python3 interpreter used to run the proxy itself, so we use that.
      test: ["CMD", "python3", "-c", "import urllib.request as r; r.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/app
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      APP_API_KEY: ${APP_API_KEY}
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      litellm: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
